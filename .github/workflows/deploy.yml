name: Deploy to AWS

on:
  push:
    branches: [main]

env:
  AWS_REGION: us-east-1
  AWS_ACCOUNT_ID: "041808556268"
  BACKEND_IMAGE: toofan-backend
  FRONTEND_IMAGE: toofan-frontend

jobs:
  # ── Build & Push Docker images to ECR ──────
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::041808556268:role/GitHubActionsRole
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build & push backend image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        run: |
          docker build -t $ECR_REGISTRY/$BACKEND_IMAGE:$GITHUB_SHA \
                       -t $ECR_REGISTRY/$BACKEND_IMAGE:latest \
                       ./toofan-backend
          docker push $ECR_REGISTRY/$BACKEND_IMAGE:$GITHUB_SHA
          docker push $ECR_REGISTRY/$BACKEND_IMAGE:latest

      - name: Build & push frontend image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        run: |
          docker build -t $ECR_REGISTRY/$FRONTEND_IMAGE:$GITHUB_SHA \
                       -t $ECR_REGISTRY/$FRONTEND_IMAGE:latest \
                       ./toofan-frontend
          docker push $ECR_REGISTRY/$FRONTEND_IMAGE:$GITHUB_SHA
          docker push $ECR_REGISTRY/$FRONTEND_IMAGE:latest

  # ── Deploy to EC2 via SSH ───────────────────
  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check secrets are set
        run: |
          if [ -z "${{ secrets.EC2_HOST }}" ]; then
            echo "ERROR: EC2_HOST secret is not set"
            exit 1
          fi
          if [ -z "${{ secrets.EC2_SSH_KEY }}" ]; then
            echo "ERROR: EC2_SSH_KEY secret is not set"
            exit 1
          fi
          echo "Secrets OK — deploying to ${{ secrets.EC2_HOST }}"

      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ec2-user
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -e

            mkdir -p /home/ec2-user/toofan-platform
            cd /home/ec2-user/toofan-platform

            # Authenticate to ECR
            aws ecr get-login-password --region us-east-1 | \
              docker login --username AWS --password-stdin \
              041808556268.dkr.ecr.us-east-1.amazonaws.com

            # Pull latest images
            docker compose pull

            # Run DB migrations
            docker compose run --rm toofan-backend \
              npx prisma migrate deploy

            # Start/restart services
            docker compose up -d --no-deps toofan-backend toofan-frontend

            # Cleanup old images
            docker image prune -f
