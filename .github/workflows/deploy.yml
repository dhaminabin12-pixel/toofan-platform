name: Deploy to AWS EC2

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check secrets are set
        run: |
          if [ -z "${{ secrets.EC2_HOST }}" ]; then
            echo "ERROR: EC2_HOST secret is not set"
            exit 1
          fi
          if [ -z "${{ secrets.EC2_SSH_KEY }}" ]; then
            echo "ERROR: EC2_SSH_KEY secret is not set"
            exit 1
          fi
          echo "Secrets OK - deploying to ${{ secrets.EC2_HOST }}"

      - name: Deploy to EC2 via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ec2-user
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -e

            # Fix git safe directory issue
            git config --global --add safe.directory /home/ec2-user/toofan-platform
            # Pull latest code
            cd /home/ec2-user/toofan-platform
            git pull origin main

            # Install dependencies
            cd toofan-backend
            npm install --production

            # Run DB migrations
            npx prisma generate
            npx prisma db push --skip-generate

            # Restart backend with PM2
            pm2 restart toofan-backend || pm2 start src/index.js --name toofan-backend

            echo "Deployment complete!"
